<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Quản lý Chung cư {% endblock %}</title> <!-- Kế thừa tiêu đề -->
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex;">

    <!-- Thanh điều hướng dọc -->
    <div class="sidebar" style="width: 250px; background-color: #C0C0C0; color: white; height: 100vh; padding: 30px; position: fixed; top: 0; left: 0; transition: left 0.3s ease;">
        <div class="logo" style="text-align: center; margin-bottom: 50px;">
            <h2 style="margin: 0; font-size: 50px;">Logo</h2>
        </div>
        <ul class="nav" style="list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column;">
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/residents'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Quản lý nhân khẩu</button></li>
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/households'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Quản lý hộ khẩu</button></li>
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/statistics'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Thông kê, Tìm kiếm</button></li>
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/update'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Sửa thông tin</button></li>
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/change-password'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Đổi mật khẩu</button></li>
            <li style="margin-bottom: 20px;"><button class="nav-btn" onclick="window.location.href='/logout'" style="background-color: #4B4B4B; color: white; font-size: 18px; width: 100%; padding: 20px; border: none; text-align: center; line-height: normal; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Logout</button></li>
        </ul>
    </div>

    <!-- Nội dung trang -->
    <div class="content" style="margin-left: 250px; padding: 30px;">
        <!-- Chèn nội dung của từng trang -->
        {% block content %}
        {% endblock %}
    </div>
    
</body>
</html>
